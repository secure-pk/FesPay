<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download FesPay v1.0.2</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons for UI Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6', // Blue-500
                        secondary: '#1e40af', // Blue-800
                    },
                    animation: {
                        'bounce-slow': 'bounce 3s linear infinite',
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar and base utilities */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .dark .glass-card {
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Toast Animation */
        #toast {
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }
        #toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 flex flex-col relative overflow-hidden transition-colors duration-300">

    <!-- Background Decorative Elements -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 dark:opacity-10 animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 dark:opacity-10 animate-pulse animation-delay-2000"></div>

    <!-- Theme Toggle -->
    <div class="absolute top-4 right-4 z-50">
        <button id="themeToggle" class="p-2 bg-white dark:bg-slate-800 rounded-full shadow-lg text-slate-600 dark:text-slate-300 hover:text-blue-500 dark:hover:text-blue-400 transition-colors">
            <i class="ph ph-moon text-xl dark:hidden block"></i>
            <i class="ph ph-sun text-xl hidden dark:block"></i>
        </button>
    </div>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-4 z-10">
        <div class="glass-card max-w-md w-full rounded-3xl shadow-2xl p-8 text-center relative overflow-hidden">
            
            <!-- Top Accent Line -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-400 to-purple-500"></div>

            <!-- Logo Section -->
            <div class="relative w-28 h-28 mx-auto mb-6">
                <div class="absolute inset-0 bg-blue-500 rounded-2xl rotate-6 opacity-20 dark:opacity-40 animate-pulse"></div>
                <!-- Try loading from main, fallback to master, then fallback to placeholder -->
                <img id="appLogo" 
                     src="https://raw.githubusercontent.com/secure-pk/FesPay/main/logo.png" 
                     alt="FesPay Logo" 
                     class="relative w-28 h-28 object-cover rounded-2xl shadow-lg border-2 border-white dark:border-slate-700 bg-white"
                     onerror="fallbackImage(this)">
            </div>

            <!-- App Details -->
            <h1 class="text-3xl font-extrabold mb-2 tracking-tight">FesPay</h1>
            <p class="text-slate-500 dark:text-slate-400 mb-6 text-sm px-4">Fast, secure, and reliable payments at your fingertips.</p>

            <!-- Specs Grid -->
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-slate-100 dark:bg-slate-800/50 p-3 rounded-xl flex flex-col items-center justify-center">
                    <i class="ph ph-tag text-blue-500 text-2xl mb-1"></i>
                    <span class="text-xs text-slate-500 dark:text-slate-400 uppercase font-semibold">Version</span>
                    <span class="font-bold text-sm">v1.0.2</span>
                </div>
                <div class="bg-slate-100 dark:bg-slate-800/50 p-3 rounded-xl flex flex-col items-center justify-center">
                    <i class="ph ph-file-archive text-purple-500 text-2xl mb-1"></i>
                    <span class="text-xs text-slate-500 dark:text-slate-400 uppercase font-semibold">File Size</span>
                    <span class="font-bold text-sm">7.30 MB</span>
                </div>
            </div>

            <!-- Download Button -->
            <a href="https://github.com/secure-pk/FesPay/releases/download/v1.0.2/FesPay.apk" 
               id="downloadBtn"
               class="group relative w-full flex items-center justify-center gap-3 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold text-lg py-4 px-8 rounded-2xl shadow-lg hover:shadow-blue-500/30 transition-all duration-300 transform hover:-translate-y-1 overflow-hidden">
                <div class="absolute inset-0 w-full h-full bg-white/20 transform -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
                <i class="ph-bold ph-download-simple text-2xl group-hover:animate-bounce"></i>
                <span>Download APK</span>
            </a>

            <!-- Security Badge -->
            <div class="mt-6 flex items-center justify-center gap-2 text-xs text-slate-500 dark:text-slate-400 font-medium">
                <i class="ph-fill ph-shield-check text-green-500 text-base"></i>
                <span>Secure Download via GitHub</span>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center pb-6 text-sm text-slate-500 dark:text-slate-400 z-10">
        &copy; <span id="year"></span> FesPay. All rights reserved.
    </footer>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-slate-800 dark:bg-white text-white dark:text-slate-900 px-6 py-3 rounded-full shadow-2xl z-50 flex items-center gap-3 font-medium">
        <i class="ph-fill ph-check-circle text-green-400 dark:text-green-600 text-xl"></i>
        <span>Download is starting...</span>
    </div>

    <!-- Scripts -->
    <script>
        // Set Current Year
        document.getElementById('year').textContent = new Date().getFullYear();

        // Image Fallback Logic for GitHub Raw URLs
        function fallbackImage(img) {
            // Check if we already tried the master branch fallback
            if (!img.dataset.triedMaster) {
                img.dataset.triedMaster = 'true';
                // Fallback to master branch if main branch is not default
                img.src = 'https://raw.githubusercontent.com/secure-pk/FesPay/master/logo.png';
            } else {
                // If both fail, use a generated placeholder avatar
                img.src = 'https://ui-avatars.com/api/?name=FesPay&background=3b82f6&color=fff&rounded=true&bold=true&size=256';
                img.onerror = null; // Prevent infinite loop
            }
        }

        // Theme Toggle Logic
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;

        // Check local storage or system preference
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlElement.classList.add('dark');
        } else {
            htmlElement.classList.remove('dark');
        }

        themeToggle.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            if (htmlElement.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        });

        // Download Button Click / Toast
        const downloadBtn = document.getElementById('downloadBtn');
        const toast = document.getElementById('toast');

        downloadBtn.addEventListener('click', (e) => {
            // Show toast message
            toast.classList.add('show');
            
            // Hide toast after 3.5 seconds
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3500);
        });

        // Add custom keyframe for shimmer effect on button
        tailwind.config.theme.extend.keyframes = {
            ...tailwind.config.theme.extend.keyframes,
            shimmer: {
                '100%': { transform: 'translateX(100%)' }
            }
        };
    </script>
</body>
</html>
